<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Firewall Tower Defense</title>
        <link rel="stylesheet" href="style.css" />
    </head>
<body>

        <div class="top-right-controls">
            <div class="language-selector">
                <button onclick="setLanguage('en')">EN</button>
                <button onclick="setLanguage('fr')">FR</button>
            </div>

            <div class="tutorial-reopen-menu">
                <button id="tutorialReopenBtn" onclick="openTutorialMenu()">
                    ?
                </button>

                <div id="tutorialDropdown" class="tutorial-dropdown">
                    <button id="tutorialDropdownCloseBtn" onclick="closeTutorialMenu()">
                        X
                    </button>
                </div>
            </div>
        </div>

    <!-- Game canvas -->
    <div class="window" id="gameWindow">
        <div class="window-header" data-i18n="gameMonitor">Firewall Monitor</div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div class="resize-handle"></div>
    </div>


    <!-- Status -->
    <div class="window" id="statusWindow">
        <div class="window-header" data-i18n="systemStatus">System Status</div>

        <div class="status-bar" id="statusPanel">
            <div><span data-i18n="integrity" data-tip="tipIntegrity">Integrity:</span> <span id="valIntegrity">100%</span></div>
            <div><span data-i18n="revenue" data-tip="tipRevenue">Revenue:</span> <span id="valMoney">$0</span></div>
            <div><span data-i18n="uptime" data-tip="tipUptime">Uptime:</span> <span id="valUptime">0m0s</span></div>
            <div><span data-i18n="trafficLoad" data-tip="tipTrafficLoad">Traffic:</span> <span id="valTraffic">Lv 1</span></div>
        </div>

        <div class="resize-handle"></div>
    </div>


    <!-- Upgrades -->
    <div class="window" id="shopWindow">
        <div class="window-header" data-i18n="upgrades">Upgrades</div>

        <div class="panel shop">
            <div id="upgradeTraffic" class="stat-row">
                <span data-i18n="bandwidth" data-tip="tipBandwidth">Bandwidth</span>
                <button id="btnUpgradeTraffic" onclick="upgradeTraffic()"></button>
            </div>

            <div id="upgradeDPI" class="stat-row">
                <span data-i18n="dpiModule" data-tip="tipDPI">DPI Module</span>
                <button id="btnUpgradeDPI" onclick="upgradeDPI()"></button>
            </div>

            <div id="upgradeIntel" class="stat-row">
                <span data-i18n="patternDb" data-tip="tipPatternDb">Pattern Analysis DB</span>
                <button id="btnUpgradeIntel" onclick="upgradeThreatIntel()"></button>
            </div>

            <div id="upgradeLogSorting" class="stat-row">
                <span data-i18n="logSorting" data-tip="tipLogSorting">Log Sorting</span>
                <button id="btnUpgradeLogSorting" onclick="upgradeLogSorting()"></button>
            </div>

            <div id="upgradeHeavyBastion" class="stat-row">
                <span data-i18n="heavyBastion" data-tip="tipHeavyBastion">Heavy Bastion</span>
                <button id="btnUpgradeBastion" onclick="deployHeavyBastion()"></button>
            </div>

            <div id="upgradeRepair" class="stat-row">
                <span data-i18n="repairSystem" data-tip="tipRepairSystem">Repair System</span>
                <button id="btnRepair" onclick="repairSystem()"></button>
            </div>
        </div>

        <div class="resize-handle"></div>
    </div>


    <!-- ACL -->
    <div class="window" id="aclWindow">
        <div class="window-header" data-i18n="aclTitle">Access Control (ACL)</div>

        <div class="panel" id="aclPanel">
            <div class="acl-controls">
                <div id="shapeFilters"></div>
                <div id="colorFilters"></div>
                <div id="originFilters"></div>
                <div id="rotationFilters"></div>
            </div>

            <div class="acl-footer" data-i18n="defaultPolicy">
                Default Policy: DENY ALL
            </div>
        </div>

        <div class="resize-handle"></div>
    </div>


    <!-- Log -->
    <div class="window" id="logWindow">
        <div class="window-header" data-i18n="trafficLog">Traffic Log</div>

        <div class="panel" id="logPanel">
            <div class="log-filters">
                <button onclick="toggleLogType('allow')" id="btnAllow" data-i18n="allow" data-tip="tipAllow">
                    ALLOW
                </button>

                <button onclick="toggleLogType('drop')" id="btnDrop" data-i18n="drop" data-tip="tipDrop">
                    DROP
                </button>

                <button onclick="toggleLogType('alert')" id="btnAlert" data-i18n="critical" data-tip="tipCritical">
                    CRITICAL
                </button>
            </div>

            <div class="log-container" id="sysLog"></div>
        </div>

        <div class="resize-handle"></div>
    </div>


    <!-- Tutorial -->
        <div class="tutorial-panel">
            <button id="tutorialCloseBtn" onclick="closeTutorial()">X</button>

            <h2 id="tutorialTitle">Tutoriel</h2>
            <h3 id="tutorialSubtitle">Tutoriel</h3>

            <div id="tutorialContent" class="tutorial-content left">
                Welcome to the firewall interface!
            </div>

            <div class="tutorial-controls">
                <button id="tutorialPreviousBtn" onclick="previousTutorialStep()">
                    Previous
                </button>

                <button id="tutorialNextBtn" onclick="nextTutorialStep()">
                    Next
                </button>
            </div>

        </div>


    <div id="tooltip" class="tooltip" style="display:none;"></div>

    <script src="localisation.js"></script>
    <script src="script.js"></script>

</body>
</html>
