<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Firewall Tower Defense</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1 data-i18n="title">// Network Perimeter Defense</h1>

        <div class="top-right-controls">
            <div class="language-selector">
                <button onclick="setLanguage('en')">EN</button>
                <button onclick="setLanguage('fr')">FR</button>
            </div>

            <div class="tutorial-reopen-menu">
                <button id="tutorialReopenBtn" onClick="openTutorialMenu()">
                    ?
                </button>

                <div id="tutorialDropdown" class="tutorial-dropdown">
                    <button id="tutorialDropdownCloseBtn" onclick="closeTutorialMenu()">X</button>
                </div>
            </div>
        </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
            </div>

            <div class="status-bar" id="statusPanel">
                <div><span data-i18n="integrity">Integrity:</span> <span id="valIntegrity">100%</span></div>
                <div><span data-i18n="revenue">Revenue:</span> <span id="valMoney">$0</span></div>
                <div><span data-i18n="uptime">Uptime:</span> <span id="valUptime">0m0s</span></div>
                <div><span data-i18n="trafficLoad">Traffic:</span> <span id="valTraffic">Lv 1</span></div>
            </div>


        <div class="game-layout">
            <div class="bottom-panels">
                <!-- Upgrades Panel -->
                <div class="panel">
                    <h2 data-i18n="upgrades">Upgrades</h2>
                    <div id="upgradeTraffic" class="stat-row" data-tip="Accélère la fréquence d'apparition des paquets à l'écran">
                        <span data-i18n="bandwidth">Bandwidth</span>
                        <button id="btnUpgradeTraffic" onclick="upgradeTraffic()">
                            <span data-i18n="buy">Buy</span> ($50)
                        </button>
                    </div>
                    <div id="upgradeDPI" class="stat-row" data-tip="Améliore la capacité d'analyse des paquets">
                        <span data-i18n="dpiModule">DPI Module</span>
                        <button id="btnUpgradeDPI" onclick="upgradeDPI()">
                            <span data-i18n="buy">Buy</span> ($300)
                        </button>
                    </div>
                    <div id="upgradeIntel" class="stat-row" data-tip="Améliore la base de données d'analyse des modèles">
                        <span data-i18n="patternDb">Pattern Analysis DB</span>
                        <button id="btnUpgradeIntel" onclick="upgradeThreatIntel()">
                            <span data-i18n="buy">Buy</span> ($500)
                        </button>
                    </div>
                    <div id="upgradeLogSorting" class="stat-row" data-tip="Active les filtres du journal reseau">
                        <span data-i18n="logSorting">Log Sorting</span>
                        <button id="btnUpgradeLogSorting" onclick="upgradeLogSorting()">
                            <span data-i18n="buy">Buy</span> ($250)
                        </button>
                    </div>
                    <div id="upgradeHeavyBastion" class="stat-row" data-tip="Déploie une unité de défense massive qui absorbe 50% des dégâts critiques">
                        <span data-i18n="heavyBastion">Heavy Bastion</span>
                        <button id="btnUpgradeBastion" onclick="deployHeavyBastion()">
                            <span data-i18n="deploy">Deploy</span> ($750)
                        </button>
                    </div>
                    <div id="upgradeRepair" class="stat-row" style="margin-top: auto" data-tip="Répare le Firewall">
                        <span data-i18n="repairSystem">Repair System</span>
                        <button id="btnRepair" onclick="repairSystem()">
                            <span data-i18n="repair">Repair</span> ($100)
                        </button>
                    </div>
                </div>
                    <!-- ACL Management Panel -->
                    <div class="panel" id="aclPanel">
                        <h2 data-i18n="aclTitle">Access Control (ACL)</h2>
                            <div class="acl-controls">
                                <div id="shapeFilters"></div>
                                <div id="colorFilters"></div>
                                <div id="sizeFilters"></div>
                                <div id="originFilters"></div>
                                <div id="rotationFilters"></div>
                            </div>
                        <div class="acl-footer" data-i18n="defaultPolicy">
                                Default Policy: DENY ALL
                         </div>
                    </div>


                    <!-- Traffic Log Panel -->
                    <div class="panel" id="logPanel">
                        <h2 data-i18n="trafficLog">Traffic Log</h2>
                        <div class="log-filters">
                            <button onclick="toggleLogType('allow')" id="btnAllow" data-i18n="allow">ALLOW</button>
                            <button onclick="toggleLogType('drop')" id="btnDrop" data-i18n="drop">DROP</button>
                            <button onclick="toggleLogType('alert')" id="btnAlert" data-i18n="critical">CRITICAL</button>
                        </div>
                        <div class="log-container" id="sysLog"></div>
                    </div>
                </div>
            </div>

        <div class="tutorial-panel">
            <button id="tutorialCloseBtn" onclick="closeTutorial()">
                    X
                </button>
            <h2 id="tutorialTitle">Tutoriel</h2>
            <h3 id="tutorialSubtitle">Tutoriel</h3>

            <div id="tutorialContent" class="tutorial-content left">
                Welcome to the firewall interface!
            </div>

            <div class="tutorial-controls">
                <button  id="tutorialPreviousBtn" onclick="previousTutorialStep()" data-i18n="previous">
                    Previous
                </button>
                <button id="tutorialNextBtn" onclick="nextTutorialStep()" data-i18n="next">
                    Next
                </button>
            </div>
        </div>


        <div id="tooltip" class="tooltip" style="display:none;"></div>
        <script src="localisation.js"></script>
        <script src="script.js"></script>
    </body>
</html>
